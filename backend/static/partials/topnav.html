<header class="h-[76px] bg-surface border-b-4 border-ink flex items-center justify-between px-6 sticky top-0 z-50">
    <div class="flex items-center gap-4 text-ink w-[240px]">
        <div
            class="size-8 bg-primary rounded border-2 border-ink flex items-center justify-center text-surface font-bold text-xl leading-none">
            C</div>
        <a href="/" class="text-2xl font-extrabold tracking-tight">CampusHub</a>
    </div>
    <div class="flex-1 max-w-[600px] px-4" id="topnav-search">
        <form id="topnav-search-form" class="flex w-full items-center border-thick rounded bg-surface h-12 shadow-soft">
            <div class="px-3 text-ink flex items-center">
                <span class="material-symbols-outlined">search</span>
            </div>
            <input id="topnav-search-input"
                class="w-full h-full bg-transparent border-none focus:ring-0 text-ink font-medium placeholder:text-muted"
                placeholder="Search the yard..." type="text" />
        </form>
    </div>
    <div class="flex items-center gap-4 w-[240px] justify-end">
        <a href="/notifications"
            class="relative size-12 bg-surface border-thick rounded flex items-center justify-center text-ink btn-shadow-hard btn-press">
            <span class="material-symbols-outlined">notifications</span>
            <span class="absolute -top-2 -right-2 size-4 bg-accent border-2 border-ink rounded-full"></span>
        </a>
        <div id="topnav-guest" class="hidden items-center gap-2">
            <a href="/login"
                class="bg-surface border-thick rounded px-4 py-2 font-bold uppercase shadow-soft btn-press">Login</a>
            <a href="/register"
                class="bg-primary text-surface border-thick rounded px-4 py-2 font-bold uppercase shadow-hard btn-press">Join</a>
        </div>
        <div id="topnav-auth" class="hidden items-center gap-2">
            <button id="topnav-logout"
                class="bg-surface border-thick rounded px-4 py-2 font-bold uppercase shadow-soft btn-press"
                type="button">Logout</button>
            <a id="topnav-profile" href="/"
                class="size-12 bg-primary border-thick rounded bg-cover bg-center shadow-soft overflow-hidden"></a>
        </div>
    </div>
</header>
