<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampusHub | Following</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="/static/css/app.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0033a0",
                        accent: "#ffc72c",
                        background: "#f8fafc",
                        surface: "#ffffff",
                        ink: "#0f172a",
                        muted: "#64748b",
                    },
                    fontFamily: {
                        display: ["Poppins", "sans-serif"],
                        body: ["Poppins", "sans-serif"],
                    },
                },
            },
        };
    </script>
</head>

<body class="min-h-full bg-background text-ink font-body">
    <div id="topnav"></div>
    <main class="max-w-[1200px] mx-auto flex gap-6 pt-8 px-4 items-start pb-20">
        <div id="leftnav"></div>
        <section class="w-[600px] shrink-0 flex flex-col">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-[32px] font-extrabold uppercase tracking-tight text-ink">Following</h1>
            </div>
            <div class="flex gap-8 border-b-4 border-ink mb-6">
                <button id="tab-following"
                    class="pb-3 px-2 font-bold uppercase text-lg text-primary border-b-4 border-primary -mb-[4px]"
                    type="button">
                    Following
                    <span id="count-following" class="ml-2 text-muted text-sm"></span>
                </button>
                <button id="tab-followers" class="pb-3 px-2 font-bold uppercase text-lg text-muted" type="button">
                    Followers
                    <span id="count-followers" class="ml-2 text-muted text-sm"></span>
                </button>
            </div>
            <div id="follow-list" class="flex flex-col gap-4"></div>
        </section>
        <div id="rightsidebar"></div>
    </main>
    <script type="module" src="/static/js/pages/following.js"></script>
</body>

</html>
