<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampusHub | Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="/static/css/app.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0033a0",
                        accent: "#ffc72c",
                        background: "#f8fafc",
                        surface: "#ffffff",
                        ink: "#0f172a",
                        muted: "#64748b",
                    },
                    fontFamily: {
                        display: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Plus Jakarta Sans", "sans-serif"],
                    },
                },
            },
        };
    </script>
</head>

<body class="min-h-full bg-background text-ink font-body">
    <div id="topnav"></div>
    <main class="max-w-[1200px] mx-auto flex gap-6 pt-8 px-4 items-start pb-20">
        <div id="leftnav"></div>
        <section class="w-[600px] shrink-0 flex flex-col gap-6">
            <div class="flex items-center gap-2">
                <a href="/"
                    class="size-9 bg-surface border-thick rounded flex items-center justify-center shadow-soft btn-press"
                    aria-label="Back to feed">
                    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                </a>
                <span class="text-xs font-bold uppercase tracking-wider text-muted">Back to Feed</span>
            </div>
            <div id="post-card"></div>
            <div class="bg-surface border-thick rounded shadow-hard p-4">
                <form id="comment-form" class="flex flex-col gap-3">
                    <textarea id="comment-content" placeholder="Add a comment..."
                        class="w-full min-h-[100px] border-thick rounded p-3 text-ink placeholder:text-muted focus:outline-none"></textarea>
                    <div class="flex justify-end">
                        <button
                            class="bg-primary text-surface border-thick rounded px-6 py-2 font-bold uppercase shadow-hard btn-press"
                            type="submit">
                            Comment
                        </button>
                    </div>
                </form>
            </div>
            <div id="comment-list" class="bg-surface border-thick rounded shadow-hard divide-y-2 divide-ink"></div>
        </section>
        <div id="rightsidebar"></div>
    </main>
    <script type="module" src="/static/js/pages/post-detail.js"></script>
</body>

</html>
